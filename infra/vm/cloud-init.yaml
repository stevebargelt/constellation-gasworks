#cloud-config
# cloud-init user-data for Constellation Supabase VM on Azure
# Installs: Docker CE + Compose plugin, Azure CLI, Caddy, New Relic Infrastructure Agent
# Deploys: secret-loader and backup systemd units, /opt directory structure
# Idempotent: all steps use apt/snap/systemd patterns safe to re-run

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unzip
  - jq

write_files:
  # ── New Relic Infrastructure Agent config ─────────────────────────────────
  - path: /etc/newrelic-infra.yml
    permissions: "0640"
    owner: root:root
    content: |
      # license_key populated by secret-loader after Key Vault is available
      # Restart newrelic-infra after load-secrets.sh writes this file
      license_key: ""
      display_name: constellation-vm
      log_file: /var/log/newrelic-infra/newrelic-infra.log

  # ── Secret loader environment config ──────────────────────────────────────
  - path: /etc/supabase-loader.conf
    permissions: "0640"
    owner: root:root
    content: |
      KEYVAULT_NAME=constellation-kv
      PROJECTS=constellation

  # ── Supabase secret-loader systemd service ────────────────────────────────
  - path: /etc/systemd/system/supabase-secret-loader.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Load Supabase project secrets from Azure Key Vault
      Before=docker.service
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      User=root
      EnvironmentFile=/etc/supabase-loader.conf
      ExecStart=/opt/scripts/load-secrets.sh
      Restart=on-failure
      RestartSec=10s
      StartLimitIntervalSec=60s
      StartLimitBurst=3
      TimeoutStartSec=120s
      PrivateTmp=yes
      NoNewPrivileges=yes
      ProtectSystem=strict
      ReadWritePaths=/opt

      [Install]
      WantedBy=multi-user.target

  # ── Supabase backup systemd service ───────────────────────────────────────
  - path: /etc/systemd/system/supabase-backup.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Supabase daily backup to Azure Blob Storage
      After=docker.service supabase-secret-loader.service
      Requires=docker.service

      [Service]
      Type=oneshot
      User=root
      EnvironmentFile=/etc/supabase-loader.conf
      ExecStart=/opt/scripts/backup.sh
      TimeoutStartSec=7200
      StandardOutput=journal
      StandardError=journal

  # ── Supabase backup systemd timer ─────────────────────────────────────────
  - path: /etc/systemd/system/supabase-backup.timer
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Daily Supabase backup timer

      [Timer]
      OnCalendar=*-*-* 02:00:00 UTC
      Persistent=true

      [Install]
      WantedBy=timers.target

  # ── Caddyfile placeholder (real config deployed by IaC or later step) ─────
  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    owner: root:root
    content: |
      # Placeholder — replaced by IaC during provision step
      :80 {
        respond "Caddy is running — awaiting configuration" 200
      }

runcmd:
  # ── 1. Docker CE ──────────────────────────────────────────────────────────
  - |
    if ! command -v docker &>/dev/null; then
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
        > /etc/apt/sources.list.d/docker.list
      apt-get update -qq
      apt-get install -y docker-ce docker-ce-cli containerd.io \
        docker-buildx-plugin docker-compose-plugin
    fi
  - systemctl enable --now docker

  # ── 2. Azure CLI ──────────────────────────────────────────────────────────
  - |
    if ! command -v az &>/dev/null; then
      curl -sL https://aka.ms/InstallAzureCLIDeb | bash
    fi

  # ── 3. Caddy ──────────────────────────────────────────────────────────────
  - |
    if ! command -v caddy &>/dev/null; then
      curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
        | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt \
        > /etc/apt/sources.list.d/caddy-stable.list
      apt-get update -qq
      apt-get install -y caddy
    fi
  - systemctl enable --now caddy

  # ── 4. New Relic Infrastructure Agent ─────────────────────────────────────
  - |
    if ! command -v newrelic-infra &>/dev/null; then
      curl -s https://download.newrelic.com/infrastructure_agent/gpg/newrelic-infra.gpg \
        | gpg --dearmor -o /etc/apt/trusted.gpg.d/newrelic-infra.gpg
      printf "deb https://download.newrelic.com/infrastructure_agent/linux/apt %s main\n" \
        "$(lsb_release -cs)" > /etc/apt/sources.list.d/newrelic-infra.list
      apt-get update -qq
      apt-get install -y newrelic-infra
    fi
  # NR agent starts after load-secrets.sh writes the license key
  - systemctl disable newrelic-infra || true

  # ── 5. Directory structure ─────────────────────────────────────────────────
  - mkdir -p /opt/supabase-constellation
  - mkdir -p /opt/scripts
  - chmod 750 /opt/supabase-constellation
  - chmod 755 /opt/scripts

  # ── 6. Deploy load-secrets.sh and backup.sh from repo ─────────────────────
  # (These are written by IaC/Ansible after the VM provisions;
  #  cloud-init creates the target dirs so the scripts land correctly)

  # ── 7. Enable systemd units ───────────────────────────────────────────────
  - systemctl daemon-reload
  - systemctl enable supabase-secret-loader.service
  - systemctl enable supabase-backup.timer
  - systemctl start supabase-backup.timer

final_message: |
  cloud-init complete. Docker, Azure CLI, Caddy, and New Relic infra agent are installed.
  supabase-secret-loader.service and supabase-backup.timer are enabled.
  Run 'systemctl start supabase-secret-loader' once Key Vault is provisioned
  to populate /opt/supabase-constellation/.env, then start supabase containers.
