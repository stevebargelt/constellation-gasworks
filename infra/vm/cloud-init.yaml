#cloud-config
# cloud-init user-data for Constellation Supabase VM on Azure
# Installs: Docker CE + Compose plugin, Azure CLI, Caddy, New Relic Infrastructure Agent
# Deploys: secret-loader and backup systemd units, /opt directory structure
# Idempotent: all steps use apt/snap/systemd patterns safe to re-run

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unzip
  - jq

write_files:
  # ── New Relic Infrastructure Agent config ─────────────────────────────────
  - path: /etc/newrelic-infra.yml
    permissions: "0640"
    owner: root:root
    content: |
      # license_key populated by secret-loader after Key Vault is available
      # Restart newrelic-infra after load-secrets.sh writes this file
      license_key: ""
      display_name: constellation-vm
      log_file: /var/log/newrelic-infra/newrelic-infra.log

  # ── Secret loader environment config ──────────────────────────────────────
  - path: /etc/supabase-loader.conf
    permissions: "0640"
    owner: root:root
    content: |
      KEYVAULT_NAME=kv-constellation
      PROJECTS=constellation

  # ── Supabase secret-loader systemd service ────────────────────────────────
  - path: /etc/systemd/system/supabase-secret-loader.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Load Supabase project secrets from Azure Key Vault
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      User=root
      EnvironmentFile=/etc/supabase-loader.conf
      ExecStart=/opt/scripts/load-secrets.sh
      TimeoutStartSec=120s
      PrivateTmp=yes
      NoNewPrivileges=yes
      ProtectSystem=strict
      ReadWritePaths=/opt

      [Install]
      WantedBy=multi-user.target

  # ── Supabase backup systemd service ───────────────────────────────────────
  - path: /etc/systemd/system/supabase-backup.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Supabase daily backup to Azure Blob Storage
      After=docker.service supabase-secret-loader.service
      Requires=docker.service

      [Service]
      Type=oneshot
      User=root
      EnvironmentFile=/etc/supabase-loader.conf
      ExecStart=/opt/scripts/backup.sh
      TimeoutStartSec=7200
      StandardOutput=journal
      StandardError=journal

  # ── Supabase backup systemd timer ─────────────────────────────────────────
  - path: /etc/systemd/system/supabase-backup.timer
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Daily Supabase backup timer

      [Timer]
      OnCalendar=*-*-* 02:00:00 UTC
      Persistent=true

      [Install]
      WantedBy=timers.target

  # ── Caddyfile ─────────────────────────────────────────────────────────────
  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    owner: root:root
    content: |
      constellation.db.harebrained-apps.com {
        reverse_proxy localhost:8000
      }

      studio.constellation.db.harebrained-apps.com {
        reverse_proxy localhost:3000
      }

  # ── load-secrets.sh ───────────────────────────────────────────────────────
  - path: /opt/scripts/load-secrets.sh
    permissions: "0750"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      # Pull Key Vault secrets for each Supabase project and write
      # /opt/supabase-{project}/.env consumed by Docker Compose env_file.
      set -euo pipefail

      : "${KEYVAULT_NAME:?KEYVAULT_NAME must be set}"
      : "${PROJECTS:?PROJECTS must be set}"

      declare -A SECRET_MAP=(
        [JWT_SECRET]=JWT_SECRET
        [ANON_KEY]=ANON_KEY
        [SERVICE_ROLE_KEY]=SERVICE_ROLE_KEY
        [POSTGRES_PASSWORD]=POSTGRES_PASSWORD
        [DASHBOARD_USERNAME]=DASHBOARD_USERNAME
        [DASHBOARD_PASSWORD]=DASHBOARD_PASSWORD
        [SMTP_HOST]=SMTP_HOST
        [SMTP_PORT]=SMTP_PORT
        [SMTP_USER]=SMTP_USER
        [SMTP_PASS]=SMTP_PASS
        [SMTP_SENDER_NAME]=SMTP_SENDER_NAME
      )

      for project in $PROJECTS; do
        project_upper="${project^^}"
        env_dir="/opt/supabase-${project}"
        env_file="${env_dir}/.env"

        mkdir -p "$env_dir"
        tmp_file=$(mktemp "${env_dir}/.env.XXXXXX")
        chmod 600 "$tmp_file"

        echo "# Auto-generated by load-secrets.sh — do not edit" > "$tmp_file"
        echo "# Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$tmp_file"

        for secret_suffix in "${!SECRET_MAP[@]}"; do
          kv_secret_name="${project_upper}-${secret_suffix//_/-}"
          env_var_name="${SECRET_MAP[$secret_suffix]}"

          secret_value=$(az keyvault secret show \
            --vault-name "$KEYVAULT_NAME" \
            --name "$kv_secret_name" \
            --query "value" \
            --output tsv 2>/dev/null) || {
            echo "WARNING: secret ${kv_secret_name} not found in ${KEYVAULT_NAME}, skipping" >&2
            continue
          }

          printf '%s=%s\n' "$env_var_name" "$secret_value" >> "$tmp_file"
        done

        mv "$tmp_file" "$env_file"
        echo "Wrote ${env_file}"
      done

      # Shared secret: RESEND_API_KEY
      mkdir -p /opt/supabase-shared
      shared_tmp=$(mktemp "/opt/supabase-shared/.shared.env.XXXXXX")
      chmod 600 "$shared_tmp"
      echo "# Shared secrets — do not edit" > "$shared_tmp"

      resend_key=$(az keyvault secret show \
        --vault-name "$KEYVAULT_NAME" \
        --name "RESEND-API-KEY" \
        --query "value" \
        --output tsv 2>/dev/null) || true
      [ -n "${resend_key:-}" ] && printf 'RESEND_API_KEY=%s\n' "$resend_key" >> "$shared_tmp"

      mv "$shared_tmp" /opt/supabase-shared/shared.env
      echo "Wrote /opt/supabase-shared/shared.env"
      echo "Secret loading complete."

  # ── backup.sh ─────────────────────────────────────────────────────────────
  - path: /opt/scripts/backup.sh
    permissions: "0750"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      # Daily pg_dump + Azure Blob upload for all registered Supabase projects.
      set -euo pipefail

      LOG_FILE="/var/log/supabase-backup.log"
      exec > >(tee -a "$LOG_FILE") 2>&1

      PROJECTS="${PROJECTS:-constellation}"
      BLOB_CONTAINER="${BLOB_CONTAINER:-backups}"
      BACKUP_DATE="$(date -u +%Y-%m-%d)"

      if [[ -z "${STORAGE_ACCOUNT:-}" ]]; then
        CONF_FILE="/etc/supabase-backup.conf"
        [[ -f "$CONF_FILE" ]] && source "$CONF_FILE"
      fi
      [[ -z "${STORAGE_ACCOUNT:-}" ]] && { echo "ERROR: STORAGE_ACCOUNT not set" >&2; exit 1; }

      log() { echo "[supabase-backup] $(date -u +%H:%M:%S) $*"; }
      err() { echo "[supabase-backup] ERROR: $*" >&2; }

      backup_project() {
        local project="$1"
        local env_file="/opt/supabase-${project}/.env"
        local tmp_dump; tmp_dump="$(mktemp /tmp/supabase-backup-XXXXXX.sql.gz)"

        log "Starting backup for project: $project"
        [[ ! -f "$env_file" ]] && { err "Env file not found: $env_file"; return 1; }

        local postgres_password=""
        postgres_password="$(grep -E '^POSTGRES_PASSWORD=' "$env_file" | cut -d= -f2- | tr -d '"' | tr -d "'")"
        [[ -z "$postgres_password" ]] && { err "POSTGRES_PASSWORD not found in $env_file"; return 1; }

        local db_port=""
        db_port="$(grep -E '^DB_PORT=' "$env_file" | cut -d= -f2- | tr -d '"' | tr -d "'" || echo "")"
        db_port="${db_port:-5432}"

        PGPASSWORD="$postgres_password" pg_dump \
          --host=127.0.0.1 --port="$db_port" --username=postgres \
          --no-owner --clean --if-exists --format=plain postgres \
          | gzip > "$tmp_dump"

        az storage blob upload \
          --account-name "$STORAGE_ACCOUNT" \
          --container-name "$BLOB_CONTAINER" \
          --name "${project}/${BACKUP_DATE}.sql.gz" \
          --file "$tmp_dump" \
          --auth-mode login \
          --overwrite

        rm -f "$tmp_dump"
        log "Backup finished for project: $project"
      }

      overall_exit=0
      for project in $PROJECTS; do
        backup_project "$project" || { err "Backup FAILED for $project"; overall_exit=1; }
      done
      exit "$overall_exit"

runcmd:
  # ── 1. Docker CE ──────────────────────────────────────────────────────────
  - |
    if ! command -v docker &>/dev/null; then
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
        > /etc/apt/sources.list.d/docker.list
      apt-get update -qq
      apt-get install -y docker-ce docker-ce-cli containerd.io \
        docker-buildx-plugin docker-compose-plugin
    fi
  - systemctl enable --now docker

  # ── 2. Azure CLI ──────────────────────────────────────────────────────────
  - |
    if ! command -v az &>/dev/null; then
      curl -sL https://aka.ms/InstallAzureCLIDeb | bash
    fi

  # ── 3. Caddy ──────────────────────────────────────────────────────────────
  - |
    if ! command -v caddy &>/dev/null; then
      curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
        | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt \
        > /etc/apt/sources.list.d/caddy-stable.list
      apt-get update -qq
      apt-get install -y caddy
    fi
  # Ensure caddy system user exists — package postinstall can race on cloud-init
  - |
    id caddy >/dev/null 2>&1 || useradd --system --create-home \
      --home-dir /var/lib/caddy --shell /usr/sbin/nologin \
      --comment "Caddy web server" caddy
  - systemctl enable --now caddy

  # ── 4. New Relic Infrastructure Agent ─────────────────────────────────────
  - |
    if ! command -v newrelic-infra &>/dev/null; then
      curl -s https://download.newrelic.com/infrastructure_agent/gpg/newrelic-infra.gpg \
        | gpg --dearmor -o /etc/apt/trusted.gpg.d/newrelic-infra.gpg
      printf "deb https://download.newrelic.com/infrastructure_agent/linux/apt %s main\n" \
        "$(lsb_release -cs)" > /etc/apt/sources.list.d/newrelic-infra.list
      apt-get update -qq
      apt-get install -y newrelic-infra
    fi
  # NR agent starts after load-secrets.sh writes the license key
  - systemctl disable newrelic-infra || true

  # ── 5. Directory structure ─────────────────────────────────────────────────
  - mkdir -p /opt/supabase-constellation
  - mkdir -p /opt/scripts
  - chmod 750 /opt/supabase-constellation
  - chmod 755 /opt/scripts

  # ── 6. Enable systemd units ───────────────────────────────────────────────
  - systemctl daemon-reload
  - systemctl enable supabase-secret-loader.service
  - systemctl enable supabase-backup.timer
  - systemctl start supabase-backup.timer

final_message: |
  cloud-init complete. Docker, Azure CLI, Caddy, and New Relic infra agent are installed.
  supabase-secret-loader.service and supabase-backup.timer are enabled.
  Run 'systemctl start supabase-secret-loader' once Key Vault is provisioned
  to populate /opt/supabase-constellation/.env, then start supabase containers.
