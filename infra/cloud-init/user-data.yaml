#cloud-config
# cloud-init user-data for Constellation Supabase VM on Azure
# Installs: Docker CE + Compose plugin, Azure CLI, Caddy, New Relic Infrastructure Agent
# Deploys: secret-loader.service, backup.timer/backup.service, /opt directory structure
# Idempotent: all steps use apt/snap/systemd patterns safe to re-run

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unzip
  - jq

write_files:
  # ── load-secrets.sh ───────────────────────────────────────────────────────
  # Pulls per-project secrets from Azure Key Vault (managed identity — no creds needed)
  # and writes /opt/supabase/{project}/.env + /opt/supabase/shared.env
  - path: /opt/scripts/load-secrets.sh
    permissions: "0750"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      # load-secrets.sh — fetch Key Vault secrets and write per-project .env files.
      # Called by secret-loader.service before docker.service starts.
      #
      # Required env:
      #   KEYVAULT_NAME  — Azure Key Vault name (e.g. "constellation-kv")
      #   PROJECTS       — space-separated project slugs (e.g. "constellation")
      set -euo pipefail

      : "${KEYVAULT_NAME:?KEYVAULT_NAME must be set}"
      : "${PROJECTS:?PROJECTS must be set}"

      fetch_secret() {
        az keyvault secret show \
          --vault-name "$KEYVAULT_NAME" \
          --name "$1" \
          --query "value" \
          --output tsv 2>/dev/null
      }

      # Per-project secrets: KV name suffix → env var name
      declare -A PROJECT_SECRETS=(
        [JWT-SECRET]=JWT_SECRET
        [POSTGRES-PASSWORD]=POSTGRES_PASSWORD
        [ANON-KEY]=ANON_KEY
        [SERVICE-ROLE-KEY]=SERVICE_ROLE_KEY
      )

      for project in $PROJECTS; do
        project_upper="${project^^}"
        env_dir="/opt/supabase/${project}"
        mkdir -p "$env_dir"
        tmp=$(mktemp "${env_dir}/.env.XXXXXX")
        chmod 600 "$tmp"
        echo "# Auto-generated by load-secrets.sh — do not edit" > "$tmp"
        echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$tmp"

        for suffix in "${!PROJECT_SECRETS[@]}"; do
          kv_name="${project_upper}-${suffix}"
          env_var="${PROJECT_SECRETS[$suffix]}"
          val=$(fetch_secret "$kv_name") || {
            echo "WARNING: ${kv_name} not found in ${KEYVAULT_NAME}, skipping" >&2
            continue
          }
          printf '%s=%s\n' "$env_var" "$val" >> "$tmp"
        done

        mv "$tmp" "${env_dir}/.env"
        echo "Wrote ${env_dir}/.env"
      done

      # Shared secrets (not project-scoped)
      shared_tmp=$(mktemp "/opt/supabase/.shared.env.XXXXXX")
      chmod 600 "$shared_tmp"
      echo "# Shared secrets — do not edit" > "$shared_tmp"

      resend=$(fetch_secret "RESEND-API-KEY") || true
      [ -n "${resend:-}" ] && printf 'RESEND_API_KEY=%s\n' "$resend" >> "$shared_tmp"

      mv "$shared_tmp" /opt/supabase/shared.env
      echo "Wrote /opt/supabase/shared.env"
      echo "Secret loading complete."

  # ── secret-loader.service ─────────────────────────────────────────────────
  - path: /etc/systemd/system/secret-loader.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Load Supabase project secrets from Azure Key Vault
      Before=docker.service
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      User=root
      EnvironmentFile=/etc/supabase-loader.conf
      ExecStart=/opt/scripts/load-secrets.sh
      Restart=on-failure
      RestartSec=10s
      StartLimitIntervalSec=60s
      StartLimitBurst=3
      TimeoutStartSec=120s
      PrivateTmp=yes
      NoNewPrivileges=yes
      ProtectSystem=strict
      ReadWritePaths=/opt

      [Install]
      WantedBy=multi-user.target

  # ── backup.service ────────────────────────────────────────────────────────
  - path: /etc/systemd/system/backup.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Supabase daily backup to Azure Blob Storage
      After=docker.service secret-loader.service
      Requires=docker.service

      [Service]
      Type=oneshot
      User=root
      EnvironmentFile=/etc/supabase-loader.conf
      ExecStart=/opt/scripts/backup.sh
      TimeoutStartSec=7200
      StandardOutput=journal
      StandardError=journal

  # ── backup.timer ──────────────────────────────────────────────────────────
  - path: /etc/systemd/system/backup.timer
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=Daily Supabase backup timer

      [Timer]
      OnCalendar=*-*-* 02:00:00 UTC
      Persistent=true

      [Install]
      WantedBy=timers.target

  # ── Secret loader environment config ──────────────────────────────────────
  - path: /etc/supabase-loader.conf
    permissions: "0640"
    owner: root:root
    content: |
      KEYVAULT_NAME=constellation-kv
      PROJECTS=constellation

  # ── New Relic Infrastructure Agent config ─────────────────────────────────
  - path: /etc/newrelic-infra.yml
    permissions: "0640"
    owner: root:root
    content: |
      # license_key written by secret-loader after Key Vault is available;
      # restart newrelic-infra after load-secrets populates this file.
      license_key: ""
      display_name: constellation-vm
      log_file: /var/log/newrelic-infra/newrelic-infra.log

  # ── Caddyfile placeholder ─────────────────────────────────────────────────
  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    owner: root:root
    content: |
      # Placeholder — replaced by IaC during provision step
      :80 {
        respond "Caddy is running — awaiting configuration" 200
      }

runcmd:
  # ── 1. Docker CE + Compose plugin ─────────────────────────────────────────
  - |
    if ! command -v docker &>/dev/null; then
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
        > /etc/apt/sources.list.d/docker.list
      apt-get update -qq
      apt-get install -y docker-ce docker-ce-cli containerd.io \
        docker-buildx-plugin docker-compose-plugin
    fi
  - systemctl enable --now docker

  # ── 2. Azure CLI ──────────────────────────────────────────────────────────
  - |
    if ! command -v az &>/dev/null; then
      curl -sL https://aka.ms/InstallAzureCLIDeb | bash
    fi

  # ── 3. Caddy ──────────────────────────────────────────────────────────────
  - |
    if ! command -v caddy &>/dev/null; then
      curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
        | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      curl -1sLf https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt \
        > /etc/apt/sources.list.d/caddy-stable.list
      apt-get update -qq
      apt-get install -y caddy
    fi
  - systemctl enable --now caddy

  # ── 4. New Relic Infrastructure Agent ─────────────────────────────────────
  - |
    if ! command -v newrelic-infra &>/dev/null; then
      curl -s https://download.newrelic.com/infrastructure_agent/gpg/newrelic-infra.gpg \
        | gpg --dearmor -o /etc/apt/trusted.gpg.d/newrelic-infra.gpg
      printf "deb https://download.newrelic.com/infrastructure_agent/linux/apt %s main\n" \
        "$(lsb_release -cs)" > /etc/apt/sources.list.d/newrelic-infra.list
      apt-get update -qq
      apt-get install -y newrelic-infra
    fi
  # Keep disabled until load-secrets writes the license key to /etc/newrelic-infra.yml
  - systemctl disable newrelic-infra || true

  # ── 5. Directory structure ─────────────────────────────────────────────────
  - mkdir -p /opt/supabase
  - mkdir -p /opt/scripts
  - mkdir -p /opt/caddy
  - chmod 750 /opt/supabase
  - chmod 755 /opt/scripts
  - chmod 755 /opt/caddy

  # ── 6. Enable systemd units ───────────────────────────────────────────────
  - systemctl daemon-reload
  - systemctl enable secret-loader.service
  - systemctl enable backup.timer
  - systemctl start backup.timer

final_message: |
  cloud-init complete.
  Installed: Docker CE + Compose plugin, Azure CLI, Caddy, New Relic infra agent.
  Enabled: secret-loader.service, backup.timer (fires daily at 02:00 UTC).
  Next: once Key Vault is provisioned, run:
    systemctl start secret-loader
  This writes /opt/supabase/{project}/.env and /opt/supabase/shared.env,
  then start your Supabase containers via docker compose.
