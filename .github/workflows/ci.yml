name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck, Build & RLS Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm turbo typecheck

      - name: Build web app
        run: pnpm turbo build --filter=@constellation/web
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: RLS bypass scan
        run: |
          echo "Scanning for direct table access that bypasses RLS views..."
          # Tables that have RLS-masking views — direct access bypasses field masking
          SENSITIVE_TABLES="calendar_events tasks meal_plans recipes"
          FOUND=0
          for table in $SENSITIVE_TABLES; do
            # Grep for raw FROM <table> or JOIN <table> in TS/TSX source files
            MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" \
              -E "(FROM|JOIN)\s+['\`\"]?${table}['\`\"]?" \
              packages/api/ apps/ 2>/dev/null \
              | grep -v "\.test\." | grep -v "\.spec\." || true)
            if [ -n "$MATCHES" ]; then
              echo "ERROR: Direct access to '${table}' detected (bypasses RLS view):"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ $FOUND -ne 0 ]; then
            echo ""
            echo "FAIL: Direct table access bypasses Row-Level Security views."
            echo "Use the RLS-enforcing views instead (e.g. 'visible_calendar_events', 'visible_tasks')."
            exit 1
          fi
          echo "RLS scan passed — no direct sensitive table access found."

  eas-build-preview:
    name: EAS Build (mobile preview)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (preview)
        working-directory: apps/mobile
        run: eas build --platform all --profile preview --non-interactive
