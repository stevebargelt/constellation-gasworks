name: VM Scripts

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/vm/**"
      - ".github/workflows/vm-scripts.yml"
  push:
    branches: [main]
    paths:
      - "infra/vm/**"
      - ".github/workflows/vm-scripts.yml"

jobs:
  shell-tests:
    name: Shell Script Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run newrelic-infra sed patch tests
        run: bash infra/vm/scripts/tests/test-newrelic-sed.sh

      - name: Run backup DB_PORT fail-hard tests
        run: bash infra/vm/scripts/tests/test-backup-db-port.sh

      - name: Run critical-secrets validation tests
        run: bash infra/vm/scripts/tests/test-critical-secrets.sh

      - name: Run caddy cert-dir guard tests
        run: bash infra/vm/scripts/tests/test-caddy-cert-dir.sh

      - name: Run Supabase data-dirs guard tests
        run: bash infra/vm/scripts/tests/test-supabase-data-dirs.sh

      - name: Run internal role password logic tests
        run: bash infra/vm/scripts/tests/test-role-passwords.sh
