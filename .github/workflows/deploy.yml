name: Deploy

on:
  push:
    branches: [main]

  # Web deployment is handled by Vercel's native GitHub integration.
  # It auto-deploys to production on merge to main — no workflow step needed.

jobs:
  eas-build-production:
    name: EAS Build (production)
    runs-on: ubuntu-latest
    # iOS credentials require interactive setup (eas build --platform ios locally).
    # continue-on-error until that's done so deploys don't block.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (production)
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive
