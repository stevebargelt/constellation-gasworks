name: EAS Preview Build

"on":
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'

jobs:
  eas-build-preview:
    name: EAS Build (mobile preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API key
        run: |
          echo "${{ secrets.EXPO_ASC_API_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/asc_api_key.p8"

      - name: EAS Build (preview)
        working-directory: apps/mobile
        run: eas build --platform all --profile preview --non-interactive
        env:
          EXPO_ASC_API_KEY_PATH: ${{ runner.temp }}/asc_api_key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.EXPO_ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.EXPO_ASC_ISSUER_ID }}
