name: Infrastructure (OpenTofu)
on:
  pull_request:
    branches: [main]
    paths:
      - "infra/tofu/**"
      - ".github/workflows/infra.yml"
  push:
    branches: [main]
    paths:
      - "infra/tofu/**"
      - ".github/workflows/infra.yml"

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read
  pull-requests: write  # Required to post plan comments on PRs

env:
  TF_VERSION: "1.8.3"
  WORKING_DIR: infra/tofu

jobs:
  plan:
    name: OpenTofu Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: OpenTofu Validate
        run: tofu validate

      - name: OpenTofu Plan
        id: plan
        run: set -o pipefail && tofu plan -no-color -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_vm_ssh_public_key: ${{ secrets.TF_VAR_VM_SSH_PUBLIC_KEY }}
          TF_VAR_backups_storage_account_name: ${{ vars.TF_VAR_BACKUPS_STORAGE_ACCOUNT_NAME }}
          TF_VAR_constellation_jwt_secret: ${{ secrets.TF_VAR_CONSTELLATION_JWT_SECRET }}
          TF_VAR_constellation_postgres_password: ${{ secrets.TF_VAR_CONSTELLATION_POSTGRES_PASSWORD }}
          TF_VAR_constellation_anon_key: ${{ secrets.TF_VAR_CONSTELLATION_ANON_KEY }}
          TF_VAR_constellation_service_role_key: ${{ secrets.TF_VAR_CONSTELLATION_SERVICE_ROLE_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planPath = '${{ env.WORKING_DIR }}/plan.txt';
            const plan = fs.existsSync(planPath) ? fs.readFileSync(planPath, 'utf8') : '(plan output not available — tofu init or plan step failed)';
            const maxLength = 65000;
            const truncated = plan.length > maxLength
              ? plan.slice(0, maxLength) + '\n\n[...output truncated...]'
              : plan;
            const outcome = '${{ steps.plan.outcome }}';
            const emoji = outcome === 'success' ? '✅' : '❌';

            const body = `## ${emoji} OpenTofu Plan — \`${{ github.sha }}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Triggered by: @${{ github.actor }} on \`${{ github.head_ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  apply:
    name: OpenTofu Apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    environment: production
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Apply
        run: tofu apply -auto-approve
        env:
          TF_VAR_vm_ssh_public_key: ${{ secrets.TF_VAR_VM_SSH_PUBLIC_KEY }}
          TF_VAR_backups_storage_account_name: ${{ vars.TF_VAR_BACKUPS_STORAGE_ACCOUNT_NAME }}
          TF_VAR_constellation_jwt_secret: ${{ secrets.TF_VAR_CONSTELLATION_JWT_SECRET }}
          TF_VAR_constellation_postgres_password: ${{ secrets.TF_VAR_CONSTELLATION_POSTGRES_PASSWORD }}
          TF_VAR_constellation_anon_key: ${{ secrets.TF_VAR_CONSTELLATION_ANON_KEY }}
          TF_VAR_constellation_service_role_key: ${{ secrets.TF_VAR_CONSTELLATION_SERVICE_ROLE_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}
